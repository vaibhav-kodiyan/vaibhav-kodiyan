name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # regenerate daily
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches: [main]       # also runs whenever you push to main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: vaibhav-kodiyan
          template: classic
          # base defaults to: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_achievements: yes          # trophy-style highlights, replaces the old vercel.app trophy widget
          plugin_achievements_threshold: C   # C = show all unlocked tiers; raise to B/A/S to show fewer
